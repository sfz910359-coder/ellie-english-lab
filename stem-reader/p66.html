    const key=clean(tok),g=glossary[key];
    let html='<div class="en">'+tok.replace(/[<>]/g,'')+' <button>🔊</button></div>';
    if(g){html+='<div class="de">'+g.de+'</div>';if(g.pos)html+='<div class="pos">'+g.pos+'</div>';}
    else html+='<div class="none">— noch keine Erklärung</div>';
    pop.innerHTML=html;pop.style.display='block';
    const r=el.getBoundingClientRect(),pw=pop.offsetWidth,ph=pop.offsetHeight;
    let left=r.left+r.width/2-pw/2;left=Math.max(8,Math.min(left,window.innerWidth-pw-8));
    let top=r.top-ph-8;if(top<8)top=r.bottom+8;
    pop.style.left=left+'px';pop.style.top=top+'px';
    speak(key);
    pop.querySelector('.en button').onclick=function(e){e.stopPropagation();speak(key);};
  }

  document.addEventListener('click',function(e){
    if(!pop.contains(e.target)&&!e.target.classList.contains('w')){
      pop.style.display='none';document.querySelectorAll('.w.active').forEach(w=>w.classList.remove('active'));
    }
  });

  function stopSectionAudio(){if(sectionAudio){sectionAudio.pause();sectionAudio=null;}activeBtn=null;}
  function clearHighlights(){document.querySelectorAll('.sec-btn.playing').forEach(b=>b.classList.remove('playing'));}

  function playSection(btn,audioUrl){
    speechSynthesis.cancel();stopSectionAudio();clearHighlights();
    btn.classList.add('loading');
    sectionAudio=new Audio(audioUrl);
    sectionAudio.playbackRate=parseFloat(rate.value);
    sectionAudio.oncanplaythrough=function(){btn.classList.remove('loading');btn.classList.add('playing');activeBtn=btn;};
    sectionAudio.onended=function(){if(activeBtn===btn)btn.classList.remove('playing');};
    sectionAudio.onerror=function(){btn.classList.remove('loading','playing');stopSectionAudio();alert('Audio konnte nicht geladen werden: '+audioUrl.replace(/.*\//,''));};
    sectionAudio.load();
    sectionAudio.play();
  }

  document.getElementById('readAll').onclick=function(){
    speechSynthesis.cancel();stopSectionAudio();clearHighlights();
    const secBtns=document.querySelectorAll('.sec-btn');
    let i=0;
    (function next(){
      if(i>=sections.length)return;
      const btn=secBtns[i];clearHighlights();
      if(btn)btn.classList.add('loading');
      activeBtn=btn;
      sectionAudio=new Audio(sections[i].audio);sectionAudio.playbackRate=parseFloat(rate.value);
      sectionAudio.oncanplaythrough=function(){if(btn){btn.classList.remove('loading');btn.classList.add('playing');}};
      sectionAudio.onended=function(){if(btn)btn.classList.remove('playing');i++;next();};
      sectionAudio.onerror=function(){if(btn)btn.classList.remove('loading','playing');i++;next();};
      sectionAudio.load();sectionAudio.play();
    })();
  };
  document.getElementById('stopBtn').onclick=function(){speechSynthesis.cancel();stopSectionAudio();clearHighlights();};
  rate.oninput=function(){if(sectionAudio)sectionAudio.playbackRate=parseFloat(rate.value);};
  document.getElementById('toggleMarks').onchange=function(e){document.body.classList.toggle('hideMarks',!e.target.checked);};
})();
</script>
</body>
</html>
